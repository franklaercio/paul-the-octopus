name: Pipeline

on:
  push:
    branches: [main, feature/2026-world-cup]
  pull_request:
  workflow_dispatch:

jobs:
  validate-and-run:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Lint
        run: python -m ruff check scripts tests

      - name: Test data contracts
        run: python -m pytest

      - name: Execute notebook pipeline
        run: python -m scripts.run_pipeline

      - name: Upload executed notebook
        uses: actions/upload-artifact@v4
        with:
          name: executed-notebooks
          path: artifacts/*.executed.ipynb
